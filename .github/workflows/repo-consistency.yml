name: Repo Consistency

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "TODO.md"
      - "config.json.example"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/repo-consistency.yml"
      - "aliases/**"
      - "references/**"
      - ".ai-docs/**"
      - "docs/cobbler.md"
      - "docs/elves/learnings.md"
      - "scripts/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - "SKILL.md"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "TODO.md"
      - "config.json.example"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/repo-consistency.yml"
      - "aliases/**"
      - "references/**"
      - ".ai-docs/**"
      - "docs/cobbler.md"
      - "docs/elves/learnings.md"
      - "scripts/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Canonical repository verification
        run: python3 scripts/verify_repo.py --skip-smokes

      - name: Installed-bundle smokes (Claude + Codex)
        run: python3 scripts/installed_bundle_smoke.py --host all
