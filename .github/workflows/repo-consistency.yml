name: Repo Consistency

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "TODO.md"
      - "config.json.example"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/repo-consistency.yml"
      - "aliases/**"
      - "references/**"
      - ".ai-docs/**"
      - "docs/cobbler.md"
      - "docs/elves/learnings.md"
      - "scripts/check_repo_consistency.py"
      - "scripts/install_doctor.py"
      - "scripts/preflight_worktree.py"
      - "scripts/pr_portfolio_report.py"
      - "scripts/release_checklist.py"
      - "scripts/sync_installed_skills.py"
      - "scripts/validate_survival_guide.py"
      - "scripts/workspace_guard.py"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - "SKILL.md"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "TODO.md"
      - "config.json.example"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/repo-consistency.yml"
      - "aliases/**"
      - "references/**"
      - ".ai-docs/**"
      - "docs/cobbler.md"
      - "docs/elves/learnings.md"
      - "scripts/check_repo_consistency.py"
      - "scripts/install_doctor.py"
      - "scripts/preflight_worktree.py"
      - "scripts/pr_portfolio_report.py"
      - "scripts/release_checklist.py"
      - "scripts/sync_installed_skills.py"
      - "scripts/validate_survival_guide.py"
      - "scripts/workspace_guard.py"
      - "tests/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate helper scripts
        run: python3 -m py_compile scripts/check_repo_consistency.py scripts/install_doctor.py scripts/preflight_worktree.py scripts/pr_portfolio_report.py scripts/release_checklist.py scripts/sync_installed_skills.py scripts/validate_survival_guide.py scripts/workspace_guard.py

      - name: Run repo consistency checker
        run: python3 scripts/check_repo_consistency.py

      - name: Run helper script regression tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run default unittest discovery
        run: python3 -m unittest discover
