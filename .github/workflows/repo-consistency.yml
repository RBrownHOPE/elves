name: Repo Consistency

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "TODO.md"
      - "api-break-approvals.json"
      - "config.json.example"
      - ".env*"
      - "openapi.json"
      - "openapi.yaml"
      - "swagger.json"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/repo-consistency.yml"
      - "aliases/**"
      - "references/**"
      - ".ai-docs/**"
      - "docs/cobbler.md"
      - "docs/openapi.json"
      - "docs/elves/**"
      - "docs/plans/**"
      - "scripts/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - "SKILL.md"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "TODO.md"
      - "api-break-approvals.json"
      - "config.json.example"
      - ".env*"
      - "openapi.json"
      - "openapi.yaml"
      - "swagger.json"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/repo-consistency.yml"
      - "aliases/**"
      - "references/**"
      - ".ai-docs/**"
      - "docs/cobbler.md"
      - "docs/openapi.json"
      - "docs/elves/**"
      - "docs/plans/**"
      - "scripts/**"
      - "tests/**"

permissions:
  contents: read

# Cancel superseded runs for the same PR/branch without shrinking the matrix.
concurrency:
  group: repo-consistency-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Matrix expands check-run names to "verify (os, py)". Branch protection on main
  # still requires the exact context name "check", so a non-matrix aggregator job
  # below re-exports that name after every matrix cell succeeds.
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux filesystem isolation backend
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          bwrap --version
          if bwrap --die-with-parent --unshare-all --share-net \
              --ro-bind /usr /usr --ro-bind /bin /bin \
              --ro-bind-try /lib /lib --ro-bind-try /lib64 /lib64 \
              --dev /dev --proc /proc --chdir / /bin/true; then
            echo "bubblewrap capability probe: usable"
          else
            echo "::notice::bubblewrap is installed but user namespaces are unavailable; the suite will exercise unavailable-backend fallback paths"
          fi

      - name: Canonical repository verification
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          BASE_REF="$EVENT_BASE_SHA"
          if ! git rev-parse --verify --quiet "${BASE_REF}^{commit}"; then
            BASE_REF="HEAD^"
          fi
          # Development commits verify Unreleased. A clean release commit uses
          # its exact SKILL version so release-scoped API approvals remain strict.
          VERIFY_VERSION="Unreleased"
          if python3 scripts/release_checklist.py >/dev/null 2>&1; then
            VERIFY_VERSION="$(python3 -c 'from pathlib import Path; from scripts.release_checklist import read_frontmatter_version; print(read_frontmatter_version(Path("SKILL.md")))')"
            BASE_REF="$(git describe --tags --abbrev=0 --exclude="v${VERIFY_VERSION}" HEAD^)"
          fi
          python3 scripts/verify_repo.py --ci --version "$VERIFY_VERSION" --base-ref "$BASE_REF"

  check:
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Require every matrix verify cell
        run: |
          result='${{ needs.verify.result }}'
          echo "verify matrix result: ${result}"
          test "${result}" = "success"
